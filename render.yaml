services:
  - type: web
    name: skillswap-matching-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_UPSTASH_REST_URL
        sync: false
      - key: REDIS_UPSTASH_REST_TOKEN
        sync: false
