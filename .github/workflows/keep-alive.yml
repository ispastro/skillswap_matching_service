name: Keep Render fastapi skillSwap Service Awake

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          curl -f https://skillswap-matching-service.onrender.com/health || echo "Service might be sleeping"
          echo "Keep-alive ping sent at $(date)"
